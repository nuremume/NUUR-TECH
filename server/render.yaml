services:
  - type: web
    name: nuur-tech-api
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false        # You must set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # Set in Render dashboard
      - key: OPENAI_API_KEY
        sync: false        # Set in Render dashboard
      - key: NODE_ENV
        value: production
